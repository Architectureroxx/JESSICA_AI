<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.E.S.S.I.C.A. Mobile Link</title>
    <style>
        body {
            background-color: #04060c;
            color: #00b4e6;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        #hud-core {
            width: 140px;
            height: 140px;
            border: 3px solid #00b4e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 180, 230, 0.4);
            animation: spin 12s linear infinite;
            margin-bottom: 40px;
        }
        #inner-core { width: 25px; height: 25px; background-color: #ffffff; border-radius: 50%; }
        .stats-panel {
            background: rgba(8, 14, 24, 0.8);
            border: 1px solid #00b4e6;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            width: 100%;
            max-width: 300px;
            margin-bottom: 40px;
        }
        #btn-talk {
            background: #04060c;
            border: 2px solid #ebb91e;
            color: #ebb91e;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: bold;
            font-family: monospace;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(235, 185, 30, 0.2);
        }
        #btn-talk:active { background: #ebb91e; color: #04060c; }
        #display-box {
            color: #d7ebfa;
            font-size: 1.1em;
            text-align: center;
            margin-top: 30px;
            max-width: 400px;
            min-height: 60px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="stats-panel">
        <h3>LAPTOP TELEMETRY</h3>
        <p>CPU: <span id="cpu-val">...</span>%</p>
        <p>RAM: <span id="ram-val">...</span>%</p>
    </div>

    <div id="hud-core"><div id="inner-core"></div></div>

    <button id="btn-talk" onclick="startVoiceRecognition()">INITIALIZE VOCAL LINK</button>

    <div id="display-box">Uplink established. Tap button to stream audio commands to your laptop.</div>

    <script>
        // Automatically determine your laptop's IP address based on how you load the page
        const BASE_URL = window.location.origin;

        // Telemetry Update Pipeline
        setInterval(async () => {
            try {
                let res = await fetch(`${BASE_URL}/api/telemetry`);
                let data = await res.json();
                document.getElementById('cpu-val').innerText = data.cpu;
                document.getElementById('ram-val').innerText = data.ram;
            } catch(e) {}
        }, 2000);

        // Mobile Phone Web Speech Recognition Engine
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            const recognizer = new Recognition();
            recognizer.continuous = false;
            recognizer.lang = 'en-US';

            function startVoiceRecognition() {
                document.getElementById('display-box').innerText = "Listening...";
                recognizer.start();
            }

            recognizer.onresult = async (event) => {
                const commandText = event.results[0][0].transcript;
                document.getElementById('display-box').innerText = `Command: "${commandText}"`;

                try {
                    let res = await fetch(`${BASE_URL}/api/command`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ command: commandText })
                    });
                    let data = await res.json();
                    document.getElementById('display-box').innerText = data.response;

                    // Speak the result out loud natively on your phone's speaker
                    const speech = new SpeechSynthesisUtterance(data.response);
                    window.speechSynthesis.speak(speech);
                } catch(err) {
                    document.getElementById('display-box').innerText = "Mainframe transmission timeout error.";
                }
            };
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.E.S.S.I.C.A. Quantum Interface Matrix</title>
    <style>
        body {
            background-color: #04060c;
            color: #00b4e6;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20px;
        }

        /* --- UPPER STATUS ARRAY --- */
        .top-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            border: 1px solid #00b4e6;
            padding: 8px 30px;
            border-radius: 6px;
            background: rgba(8, 14, 24, 0.8);
            font-size: 0.9em;
            margin-bottom: 20px;
            z-index: 10;
        }

        /* --- OPTICAL PERIMETER SCANNER CRADLE (UPPER RIGHT) --- */
        .camera-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 140px;
            height: 105px;
            border: 2px solid #00b4e6;
            background: #000;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 0 10px rgba(0, 180, 230, 0.3);
        }
        #webcam-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view like client.py */
        }
        .cam-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 1px solid rgba(0, 180, 230, 0.4);
            box-sizing: border-box;
            pointer-events: none;
        }

        /* --- CORE CENTRAL REVOLVING CORE MATRIX --- */
        .core-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        #hud-core {
            width: 220px;
            height: 220px;
            border: 2px solid #00b4e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 180, 230, 0.2);
            position: relative;
            cursor: pointer;
        }
        #hud-core::before {
            content: '';
            position: absolute;
            width: 85%;
            height: 85%;
            border: 2px dashed rgba(0, 180, 230, 0.6);
            border-radius: 50%;
            animation: spin-clockwise 20s linear infinite;
        }
        #hud-core::after {
            content: '';
            position: absolute;
            width: 70%;
            height: 70%;
            border: 4px dotted #00b4e6;
            border-radius: 50%;
            animation: spin-counter 12s linear infinite;
        }
        #inner-core {
            width: 20px;
            height: 20px;
            background-color: #ffffff;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 15px #ffffff;
        }

        /* --- LOWER DATA TERMINAL GRID --- */
        .console-panel {
            width: 100%;
            max-width: 900px;
            background: rgba(4, 8, 16, 0.9);
            border: 1px solid #00b4e6;
            border-radius: 8px;
            padding: 15px 25px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .input-line {
            width: 100%;
            background: rgba(12, 22, 38, 0.6);
            border: 1px solid #00b4e6;
            border-radius: 4px;
            color: #d7ebfa;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            padding: 10px 15px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }
        .input-line::placeholder { color: rgba(0, 180, 230, 0.4); }
        .input-line:focus { background: rgba(12, 22, 38, 0.9); box-shadow: 0 0 10px rgba(0, 180, 230, 0.3); }

        .matrix-logs { font-size: 0.95em; line-height: 1.6em; }
        .log-row { margin-bottom: 4px; }
        .highlight-blue { color: #00b4e6; font-weight: bold; }
        .highlight-white { color: #d7ebfa; }

        @keyframes spin-clockwise { 100% { transform: rotate(360deg); } }
        @keyframes spin-counter { 100% { transform: rotate(-360deg); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>CPU: <span id="cpu-val">0.0</span>%</span>
        <span>RAM: <span id="ram-val">0.0</span>%</span>
    </div>

    <div class="camera-container">
        <video id="webcam-feed" autoplay playsinline muted></video>
        <div class="cam-overlay"></div>
    </div>

    <div class="core-wrapper">
        <div id="hud-core" onclick="startVoiceRecognition()">
            <div id="inner-core"></div>
        </div>
    </div>

    <div class="console-panel">
        <input type="text" id="terminal-input" class="input-line" placeholder="Type something to know... [Hit Enter]" autocomplete="off">
        
        <div class="matrix-logs">
            <div class="log-row"><span class="highlight-blue">ACCESS LAYER:</span> BLUE</div>
            <div class="log-row"><span class="highlight-blue">TARGET USER ID:</span> UTKRISHT VERMA [MASTER ACCESS]</div>
            <div class="log-row"><span class="highlight-blue">PERIMETER EXTRACTION:</span> LIVENESS TRACKING REVERIFIED // CORE SECURITY LAYER STABLE</div>
            <div id="display-box" class="log-row highlight-white">Calibrating monitor frame buffers...</div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        // Establish Front Optical Pipeline
        async function setupOpticalScanner() {
            const video = document.getElementById('webcam-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Optical pipeline permission block:", err);
            }
        }
        setupOpticalScanner();

        // Continuous Loop Tracking Hardware Parameters
        setInterval(async () => {
            try {
                let res = await fetch(`${BASE_URL}/api/telemetry`);
                let data = await res.json();
                document.getElementById('cpu-val').innerText = data.cpu.toFixed(1);
                document.getElementById('ram-val').innerText = data.ram.toFixed(1);
            } catch(e) {}
        }, 1500);

        // Terminal Submission Execution Block
        document.getElementById('terminal-input').addEventListener('keydown', async function(e) {
            if (e.key === 'Enter') {
                const commandText = this.value.trim();
                if (!commandText) return;
                
                this.value = '';
                document.getElementById('display-box').innerText = "Transmitting framework parameters...";
                sendCommandToCore(commandText);
            }
        });

        // High-Speed Voice Routing Engine Setup
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognizer = null;
        if (Recognition) {
            recognizer = new Recognition();
            recognizer.continuous = false;
            recognizer.lang = 'en-US';

            function startVoiceRecognition() {
                document.getElementById('display-box').innerText = "Listening to vocal matrix frequencies...";
                recognizer.start();
            }

            recognizer.onresult = async (event) => {
                const spokenText = event.results[0][0].transcript;
                document.getElementById('display-box').innerText = `Heard Vocal Stream: "${spokenText}"`;
                sendCommandToCore(spokenText);
            };
        } else {
            document.getElementById('display-box').innerText = "Vocal hardware routing missing in current browser framework.";
        }

        async function sendCommandToCore(text) {
            try {
                let res = await fetch(`${BASE_URL}/api/command`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ command: text })
                });
                let data = await res.json();
                document.getElementById('display-box').innerText = data.response;

                const speech = new SpeechSynthesisUtterance(data.response);
                window.speechSynthesis.speak(speech);
            } catch(err) {
                document.getElementById('display-box').innerText = "Transmission down. Connect local laptop server script node link.";
            }
        }
    </script>
</body>
</html>

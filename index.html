<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>J.E.S.S.I.C.A. Quantum Interface Matrix</title>
    <style>
        body {
            background-color: #04060c;
            color: #00b4e6;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .config-panel {
            background: rgba(8, 14, 24, 0.9);
            border: 1px dashed #ebb91e;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            text-align: center;
        }
        .config-panel input {
            background: #04060c;
            border: 1px solid #00b4e6;
            color: #ffffff;
            padding: 5px;
            width: 480px; 
            font-family: monospace;
            text-align: center;
        }
        #hud-core {
            width: 180px;
            height: 180px;
            border: 3px solid #00b4e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 180, 230, 0.4);
            animation: spin 12s linear infinite;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #inner-core { width: 30px; height: 30px; background-color: #ffffff; border-radius: 50%; }
        .stats-panel {
            background: rgba(8, 14, 24, 0.8);
            border: 1px solid #00b4e6;
            padding: 15px 30px;
            border-radius: 6px;
            text-align: center;
            min-width: 250px;
            margin-bottom: 20px;
        }
        #display-box { color: #d7ebfa; font-size: 1.1em; max-width: 600px; text-align: center; height: 50px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="config-panel">
        <label for="tunnel-url">MAINFRAME BRIDGE LINK: </label>
        <input type="text" id="tunnel-url" placeholder="https://ladybug-clique-plywood.ngrok-free.dev" oninput="saveTunnel()">
    </div>

    <div class="stats-panel">
        <h3>SYSTEM TELEMETRY</h3>
        <p>CPU WORKLOAD: <span id="cpu-val">OFFLINE</span></p>
        <p>RAM ALLOCATION: <span id="ram-val">OFFLINE</span></p>
    </div>

    <div id="hud-core" onclick="startVoiceRecognition()">
        <div id="inner-core"></div>
    </div>

    <div id="display-box">System Initialized. Set bridge link to establish core terminal configurations.</div>

    <script>
        // FIXED: Explicit initialization check function to ensure pasted links run immediately on startup
        function initTunnelField() {
            const savedUrl = localStorage.getItem('jessica_tunnel');
            const inputField = document.getElementById('tunnel-url');
            
            if (savedUrl) {
                inputField.value = savedUrl;
                document.getElementById('display-box').innerText = "Bridge parameters mapped successfully.";
            } else {
                // Set default value explicitly if nothing is in local storage yet so it doesn't fail silently
                inputField.value = "https://ladybug-clique-plywood.ngrok-free.dev";
                localStorage.setItem('jessica_tunnel', inputField.value);
            }
        }
        
        initTunnelField();

        function saveTunnel() {
            let url = document.getElementById('tunnel-url').value.trim();
            if(url.endsWith('/')) url = url.slice(0, -1); 
            localStorage.setItem('jessica_tunnel', url);
            
            if (url) {
                document.getElementById('display-box').innerText = "Bridge parameters mapped successfully.";
            } else {
                document.getElementById('display-box').innerText = "System Initialized. Set bridge link to establish core terminal configurations.";
            }
        }

        function getBackendURL() {
            return localStorage.getItem('jessica_tunnel') || 'http://127.0.0.1:5000';
        }

        // Real-Time Telemetry Pipeline Updates via proxy link
        setInterval(async () => {
            let base = getBackendURL();
            if (!base) return;
            
            try {
                let res = await fetch(`${base}/api/telemetry`);
                let data = await res.json();
                document.getElementById('cpu-val').innerText = data.cpu + '%';
                document.getElementById('ram-val').innerText = data.ram + '%';
            } catch(e) {
                document.getElementById('cpu-val').innerText = 'OFFLINE';
                document.getElementById('ram-val').innerText = 'OFFLINE';
            }
        }, 2000);

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            const recognizer = new Recognition();
            recognizer.continuous = false;
            recognizer.lang = 'en-US';

            function startVoiceRecognition() {
                document.getElementById('display-box').innerText = "Listening to network vocals...";
                recognizer.start();
            }

            recognizer.onresult = async (event) => {
                const vocalCommand = event.results[0][0].transcript;
                document.getElementById('display-box').innerText = `Heard: "${vocalCommand}"`;
                
                let base = getBackendURL();
                try {
                    let res = await fetch(`${base}/api/command`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ command: vocalCommand })
                    });
                    let data = await res.json();
                    document.getElementById('display-box').innerText = data.response;

                    const speech = new SpeechSynthesisUtterance(data.response);
                    window.speechSynthesis.speak(speech);
                } catch(err) {
                    document.getElementById('display-box').innerText = "Communication failure. Is your local server running and the bridge active?";
                }
            };
        }
    </script>
</body>
</html>
